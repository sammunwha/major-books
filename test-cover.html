<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>표지 매칭 테스트</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, "Noto Sans KR", sans-serif; background: #f4f5f7; color: #111; padding: 24px; }
    .wrap { max-width: 860px; margin: 0 auto; }
    h1 { font-size: 20px; margin-bottom: 6px; }
    .desc { color: #555; font-size: 14px; margin-bottom: 20px; line-height: 1.5; }
    .search-box { background: #fff; border-radius: 14px; padding: 18px; box-shadow: 0 4px 14px rgba(0,0,0,.07); margin-bottom: 20px; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    input { width: 100%; height: 44px; border: 1px solid #ddd; border-radius: 10px; padding: 0 14px; font-size: 14px; }
    input:focus { outline: none; border-color: #4f46e5; }
    button { width: 100%; height: 44px; background: #4f46e5; color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
    button:hover { opacity: .88; }
    .status { font-size: 13px; color: #666; margin-top: 10px; min-height: 18px; }

    .result-wrap { display: none; }
    .section-title { font-size: 15px; font-weight: 700; margin-bottom: 12px; color: #333; }

    /* 매칭 결과 */
    .match-box { background: #fff; border-radius: 14px; padding: 18px; box-shadow: 0 4px 14px rgba(0,0,0,.07); margin-bottom: 20px; }
    .match-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .match-badge { padding: 4px 12px; border-radius: 999px; font-size: 12px; font-weight: 700; }
    .badge-ok { background: #dcfce7; color: #166534; }
    .badge-candidate { background: #fef9c3; color: #854d0e; }
    .badge-none { background: #fee2e2; color: #991b1b; }
    .match-score { font-size: 13px; color: #666; }

    /* 책 카드 그리드 */
    .books-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 14px; }
    .book-card { border-radius: 12px; overflow: hidden; border: 2px solid transparent; transition: border-color .15s, transform .1s; cursor: default; background: #f9f9f9; }
    .book-card.best { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.15); }
    .book-card img { width: 100%; aspect-ratio: 2/3; object-fit: cover; display: block; }
    .book-card .info { padding: 8px; }
    .book-card .book-title { font-size: 11px; font-weight: 700; line-height: 1.3; margin-bottom: 3px; word-break: keep-all; }
    .book-card .book-author { font-size: 10px; color: #777; }
    .book-card .book-score { font-size: 10px; color: #4f46e5; font-weight: 700; margin-top: 3px; }
    .best-label { font-size: 10px; background: #4f46e5; color: #fff; padding: 2px 7px; border-radius: 999px; display: inline-block; margin-bottom: 4px; }

    .no-image { width: 100%; aspect-ratio: 2/3; background: #eee; display: flex; align-items: center; justify-content: center; font-size: 11px; color: #999; }

    @media (max-width: 520px) { .row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="wrap">
  <h1>📚 표지 매칭 테스트</h1>
  <p class="desc">
    DB에 저장할 책 제목과 저자를 입력하면, 네이버에서 어떤 책이 검색되는지 확인할 수 있습니다.<br>
    <strong>보라색 테두리</strong>가 자동 매칭될 책입니다. (점수 40점 이상)
  </p>

  <div class="search-box">
    <div class="row">
      <input id="titleInput" type="text" placeholder="책 제목 (예: 넛지)" />
      <input id="authorInput" type="text" placeholder="저자 (예: 리처드 탈러)" />
    </div>
    <button id="searchBtn" onclick="doSearch()">네이버에서 검색해보기</button>
    <div class="status" id="status"></div>
  </div>

  <div class="result-wrap" id="resultWrap">
    <div class="match-box">
      <div class="match-header">
        <span class="match-badge" id="matchBadge"></span>
        <span class="match-score" id="matchScore"></span>
      </div>
      <p class="section-title">검색 결과 (점수 높은 순)</p>
      <div class="books-grid" id="booksGrid"></div>
    </div>
  </div>
</div>

<script>
  function norm(s) { return (s ?? "").toString().trim(); }
  function normSearch(s) { return norm(s).toLowerCase(); }
  function stripTags(s) { return norm(s).replace(/<[^>]*>/g, ""); }

  function coreTitle(s) {
    return normSearch(s).replace(/[(\[（［].*$/g, "").replace(/[=:：]/g, " ").trim();
  }

  function similarity(targetTitle, targetAuthor, it) {
    const tFull = normSearch(stripTags(it.title));
    const tCore = coreTitle(stripTags(it.title));
    const targetCore = coreTitle(targetTitle);
    const targetFull = normSearch(targetTitle);
    const a = normSearch(stripTags(it.author));
    let score = 0;

    if (tCore === targetCore && targetCore.length > 0) score += 100;
    else if (tFull === targetFull) score += 100;
    else if (tFull.includes(targetCore) || targetCore.includes(tCore)) score += 70;
    else if (tFull.includes(targetFull) || targetFull.includes(tCore)) score += 60;
    else {
      const words = targetCore.split(/\s+/).filter(w => w.length > 0);
      const matched = words.filter(w => tFull.includes(w)).length;
      score += words.length > 0 ? (matched / words.length) * 50 : 0;
    }

    if (targetAuthor) {
      const firstAuthor = normSearch(targetAuthor).split(/[\s\^,]/)[0];
      if (firstAuthor && a.includes(firstAuthor)) score += 20;
    }
    return Math.round(score);
  }

  async function doSearch() {
    const title = document.getElementById("titleInput").value.trim();
    const author = document.getElementById("authorInput").value.trim();
    if (!title) { alert("책 제목을 입력해주세요."); return; }

    document.getElementById("status").textContent = "네이버에서 검색 중…";
    document.getElementById("resultWrap").style.display = "none";

    const q = `${title} ${author}`.trim();
    const url = `/.netlify/functions/naver-book?q=${encodeURIComponent(q)}&display=8&sort=sim`;

    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`서버 오류: ${res.status}`);
      const json = await res.json();
      const items = Array.isArray(json.items) ? json.items : [];

      document.getElementById("status").textContent = `총 ${json.total || 0}건 검색됨`;

      if (!items.length) {
        document.getElementById("matchBadge").className = "match-badge badge-none";
        document.getElementById("matchBadge").textContent = "❌ 검색 결과 없음";
        document.getElementById("matchScore").textContent = "";
        document.getElementById("booksGrid").innerHTML = "<p style='color:#999;font-size:13px'>검색 결과가 없습니다. 제목을 다르게 입력해보세요.</p>";
        document.getElementById("resultWrap").style.display = "block";
        return;
      }

      const scored = items.map(it => ({ ...it, _score: similarity(title, author, it) }))
                          .sort((a, b) => b._score - a._score);

      const best = scored[0];
      const badge = document.getElementById("matchBadge");
      const scoreEl = document.getElementById("matchScore");

      if (best._score >= 40) {
        badge.className = "match-badge badge-ok";
        badge.textContent = "✅ 자동 매칭 성공";
        scoreEl.textContent = `"${stripTags(best.title)}" 이 표지로 자동 적용됩니다 (점수: ${best._score})`;
      } else if (scored.some(it => it.image)) {
        badge.className = "match-badge badge-candidate";
        badge.textContent = "⚠️ 후보 선택 필요";
        scoreEl.textContent = `가장 유사한 책 점수: ${best._score}점 (40점 미만 → 사용자가 직접 선택)`;
      } else {
        badge.className = "match-badge badge-none";
        badge.textContent = "❌ 표지 없음";
        scoreEl.textContent = "표지 이미지가 있는 책이 없습니다.";
      }

      const grid = document.getElementById("booksGrid");
      grid.innerHTML = scored.map((it, i) => {
        const isBest = i === 0 && it._score >= 40;
        const img = it.image
          ? `<img src="${it.image}" alt="${stripTags(it.title)}" />`
          : `<div class="no-image">표지 없음</div>`;
        return `
          <div class="book-card ${isBest ? 'best' : ''}">
            ${isBest ? '<div style="padding:4px 8px 0"><span class="best-label">자동 선택</span></div>' : ''}
            <a href="${it.link || '#'}" target="_blank" rel="noopener">${img}</a>
            <div class="info">
              <div class="book-title">${stripTags(it.title)}</div>
              <div class="book-author">${stripTags(it.author)}</div>
              <div class="book-score">점수: ${it._score}</div>
            </div>
          </div>`;
      }).join("");

      document.getElementById("resultWrap").style.display = "block";

    } catch (e) {
      document.getElementById("status").textContent = "오류: " + e.message + " (Netlify 환경에서만 작동합니다)";
    }
  }

  document.addEventListener("keydown", e => {
    if (e.key === "Enter") doSearch();
  });
</script>
</body>
</html>
